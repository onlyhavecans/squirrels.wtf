---
baseURL: https://squirrels.wtf
languageCode: en-us
title: Dear Squirrels, WTF
copyright: Amelia Aronsohn 2012-2025
theme: PaperMod

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
mainsections:
  - posts
  - papermod

minify:
  disableXML: true
  # minifyOutput: true

pagination:
  disableAliases: false
  pagerSize: 6

taxonomies:
  category: categories
  tag: tags
  series: series

permalinks:
  posts: /posts/:year-:month-:day-:title/

menu:
  main:
    - name: About
      url: about
      weight: 10
    - name: Uses
      url: uses
      weight: 10
    - name: Tags
      url: tags
      weight: 20
    - name: Archives
      url: archives
      weight: 50

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  author: Ame
  description: Musings, Tech, & Deep Thots
  favicon: /favicon.ico
  defaultTheme: auto
  ShowReadingTime: true
  ShowCodeCopyButtons: true
  disableSpecial1stPost: true
  ShowToc: true
  TocOpen: true
  Comments: true

  images: ["img/naryana2.png"]

  cover:
  responsiveImages: true

  homeInfoParams:
    Title: Welcome to my Nest
    Content: |
      This blog is a collection of personal writings from 2012 forward;
      Everything before 2012 was posted on LiveJournal and is lost to the ages.

      Please keep in mind that with a history of posts like this, the older content may not be something I identify or endorse anymore, but I have decided to keep it for posterity and history for now.

  socialIcons:
    - name: forgejo
      title: View my Code
      url: https://onlyhavecans.works
    - name: github
      title: Code Backup
      url: https://github.com/onlyhavecans
    - name: mastodon
      title: Mastodon (Hachyderm)
      url: https://hachyderm.io/@onlyhavecans
    - name: linktree
      title: LinkStack
      url: https://wearing.black/
    - name: rss
      title: RSS Feed
      url: https://squirrels.wtf/index.xml

# footnotereturnlinkcontents: ↩
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
